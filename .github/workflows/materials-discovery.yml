name: materials-discovery

on:
  push:
    paths:
      - "materials-discovery/**"
      - ".github/workflows/materials-discovery.yml"
  pull_request:
    paths:
      - "materials-discovery/**"
      - ".github/workflows/materials-discovery.yml"

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: materials-discovery
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy src
