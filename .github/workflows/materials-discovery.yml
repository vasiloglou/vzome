name: materials-discovery

on:
  push:
    paths:
      - "materials-discovery/**"
      - ".github/workflows/materials-discovery.yml"
  pull_request:
    paths:
      - "materials-discovery/**"
      - ".github/workflows/materials-discovery.yml"
  workflow_dispatch:
  schedule:
    - cron: "30 5 * * *"

jobs:
  quality-fast:
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: materials-discovery
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Run unit tests
        run: uv run pytest -m "not integration"

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy src

  integration-real:
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: materials-discovery
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Run integration tests
        run: uv run pytest -m integration

      - name: Run real-mode end-to-end pipeline
        run: ./scripts/run_real_pipeline.sh
