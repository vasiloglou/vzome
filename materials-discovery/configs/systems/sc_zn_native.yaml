system_name: Sc-Zn
template_family: cubic_proxy_1_0
species:
  - Sc
  - Zn
composition_bounds:
  Sc:
    min: 0.15
    max: 0.40
  Zn:
    min: 0.60
    max: 0.85
coeff_bounds:
  min: -2
  max: 2
seed: 31
default_count: 64
zomic_design: designs/zomic/sc_zn_tsai_bridge.yaml
backend:
  mode: real
  ingest_adapter: hypodx_pinned_v2026_03_09
  committee_adapter: committee_exec_cache_v1
  phonon_adapter: phonon_exec_cache_v1
  md_adapter: md_exec_cache_v1
  xrd_adapter: xrd_exec_cache_v1
  committee_provider: ase_committee_v1
  phonon_provider: mace_hessian_v1
  md_provider: ase_langevin_v1
  xrd_provider: pymatgen_xrd_v1
  committee_device: cpu
  md_temperature_k: 500.0
  md_timestep_fs: 0.5
  md_steps: 20
  xrd_wavelength: CuKa
  pinned_snapshot: data/external/fixtures/hypodx_sample.json
  validation_snapshot: data/external/pinned/sc_zn_validation_snapshot_2026_03_07.json
  validation_cache_dir: data/execution_cache/sc_zn_native
  committee_command:
    - "{python}"
    - -m
    - materials_discovery.backends.run_committee_backend
    - --input
    - "{input}"
    - --output
    - "{output}"
  phonon_command:
    - "{python}"
    - -m
    - materials_discovery.backends.run_phonon_backend
    - --input
    - "{input}"
    - --output
    - "{output}"
  md_command:
    - "{python}"
    - -m
    - materials_discovery.backends.run_md_backend
    - --input
    - "{input}"
    - --output
    - "{output}"
  xrd_command:
    - "{python}"
    - -m
    - materials_discovery.backends.run_xrd_backend
    - --input
    - "{input}"
    - --output
    - "{output}"
  benchmark_corpus: data/benchmarks/sc_zn_benchmark.json
  versions:
    hypodx_snapshot: "fixture-local"
    validation_snapshot: "2026-03-07"
    benchmark_corpus: "2026-03-07"
    validation_backend: "native-provider-v1"
